<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusHarmony | Connect & Resolve</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <!-- Hero Side -->
            <div class="auth-hero">
                <div class="illustration-box" style="animation-duration: 8s;">
                    <img src="student-icon.png" alt="CampusHarmony" style="max-width: 300px;">
                </div>
                <h1 style="font-size: 3rem; margin-bottom: 10px;">CampusHarmony</h1>
                <p style="text-align: center; color: var(--text-dim); font-size: 1.2rem; max-width: 350px;">Your voice, our commitment to a better campus environment.</p>
            </div>

            <!-- Form Side -->
            <div class="auth-form-side">
                <div class="auth-tabs">
                    <button id="student-tab" class="tab-btn active" onclick="showForm('student')">Student</button>
                    <button id="admin-tab" class="tab-btn" onclick="showForm('admin')">Admin</button>
                </div>

            <!-- Student Login/Register UI -->
            <div id="student-section">
                <div id="login-form-div">
                    <h2>Student Login</h2>
                    <form id="student-login-form">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="s-login-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="s-login-password" required>
                        </div>
                        <button type="submit" class="btn">Login</button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim);">
                        Don't have an account? <a href="#" onclick="toggleSubForm('register')"
                            style="color: var(--primary);">Register here</a>
                    </p>
                </div>

                <div id="register-form-div" style="display: none;">
                    <h2>Student Registration</h2>
                    <form id="student-register-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="reg-name" required>
                        </div>
                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 0;">
                            <div class="form-group">
                                <label>Department</label>
                                <input type="text" id="reg-dept" placeholder="e.g. CSE" required>
                            </div>
                            <div class="form-group">
                                <label>Year</label>
                                <input type="number" id="reg-year" min="1" max="5" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Residence Type</label>
                            <select id="reg-hostel" required>
                                <option value="1">Hosteller</option>
                                <option value="0">Day Scholar</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Contact Number</label>
                            <input type="text" id="reg-contact" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="reg-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="reg-pass" required>
                        </div>
                        <button type="submit" class="btn">Register</button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim);">
                        Already have an account? <a href="#" onclick="toggleSubForm('login')"
                            style="color: var(--primary);">Login here</a>
                    </p>
                </div>
            </div>

            <!-- Admin Section -->
            <div id="admin-section" style="display: none;">
                <div id="admin-login-div">
                    <h2>Admin Portal</h2>
                    <form id="admin-login-form">
                        <div class="form-group">
                            <label>Admin Email</label>
                            <input type="email" id="a-login-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="a-login-password" required>
                        </div>
                        <button type="submit" class="btn">Admin Login</button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim);">
                        Need an admin account? <a href="#" onclick="toggleAdminSubForm('register')" style="color: var(--primary);">Register here</a>
                    </p>
                </div>

                <div id="admin-register-div" style="display: none;">
                    <h2>Admin Registration</h2>
                    <form id="admin-register-form">
                        <div class="form-group">
                            <label>Admin Email</label>
                            <input type="email" id="a-reg-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="a-reg-pass" required>
                        </div>
                        <button type="submit" class="btn">Create Admin</button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim);">
                        Already have an account? <a href="#" onclick="toggleAdminSubForm('login')" style="color: var(--primary);">Login here</a>
                    </p>
                </div>
            </div>
            </div> <!-- End auth-form-side -->
        </div> <!-- End auth-card -->
    </div> <!-- End auth-container -->

    <script src="script.js"></script>
    <script>
        function showForm(role) {
            document.getElementById('student-tab').classList.toggle('active', role === 'student');
            document.getElementById('admin-tab').classList.toggle('active', role === 'admin');
            document.getElementById('student-section').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('admin-section').style.display = role === 'admin' ? 'block' : 'none';
        }

        function toggleSubForm(type) {
            document.getElementById('login-form-div').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-form-div').style.display = type === 'register' ? 'block' : 'none';
        }

        function toggleAdminSubForm(type) {
            document.getElementById('admin-login-div').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('admin-register-div').style.display = type === 'register' ? 'block' : 'none';
        }
    </script>
</body>

</html>
